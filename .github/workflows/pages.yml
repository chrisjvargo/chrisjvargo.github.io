name: Deploy GitHub Pages

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        # actions/setup-python@v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        # actions/configure-pages@v5
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests/dv -p 'test_*.py'

      - name: Build static site
        run: |
          python src/build.py --input cv/Vargo_CV.tex --preprints preprints.csv --out dist --site-url https://chrisjvargo.com

      - name: Validate static site
        run: |
          python src/validate_build.py --dist dist --site-url https://chrisjvargo.com

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        # actions/upload-pages-artifact@v4
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages@v4
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
